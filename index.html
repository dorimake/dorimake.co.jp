<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株式会社ドリメイク</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  color: #333;
}

/* ===== ヘッダー ===== */
header {
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 15px 40px;
  z-index: 1000;
}

header h1 {
  margin: 0;
  font-size: 18px;
  letter-spacing: 2px;
}

/* ===== ヒーロー ===== */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
              url("https://images.unsplash.com/photo-1503387762-592deb58ef4e");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff;
}

.hero h2 {
  font-size: 48px;
  margin-bottom: 10px;
  letter-spacing: 3px;
}

.hero p {
  font-size: 18px;
}

/* ===== セクション ===== */
section {
  padding: 80px 40px;
  max-width: 1100px;
  margin: auto;
}

h3 {
  font-size: 28px;
  margin-bottom: 30px;
  border-left: 5px solid #7ac943;
  padding-left: 10px;
}

/* ===== サービス ===== */
.service {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
}

.service-box {
  flex: 1;
  min-width: 250px;
}

.service-box h4 {
  margin-bottom: 10px;
}

/* ===== CTA ===== */
.cta {
  text-align: center;
  margin-top: 40px;
}

.cta a {
  background: #e60012;
  color: #fff;
  padding: 15px 30px;
  text-decoration: none;
  font-weight: bold;
  border-radius: 4px;
}

/* ===== フッター ===== */
footer {
  background: #111;
  color: #aaa;
  text-align: center;
  padding: 30px;
  font-size: 14px;
}
</style>

</head>

<body>

<header>
  <h1>株式会社ドリメイク</h1>
</header>

<div class="hero">
  <div>
    <h2>DORIMAKE</h2>
    <p>建設現場の効率化と環境負荷低減を支える</p>
  </div>
</div>

<section>
  <h3>Service</h3>
  <div class="service">
    <div class="service-box">
      <h4>建設発生土の受け入れ</h4>
      <p>各種工事で発生する建設発生土を適切に受け入れます。</p>
    </div>
    <div class="service-box">
      <h4>中間処理</h4>
      <p>再利用可能な資材へ加工し、環境負荷を軽減します。</p>
    </div>
    <div class="service-box">
      <h4>骨材販売</h4>
      <p>RC-40などの建設資材を安定供給します。</p>
    </div>
  </div>
</section>

<section>
  <h3>About Us</h3>
  <p>
    株式会社ドリメイクは、建設発生土の受け入れ・中間処理・骨材販売を通じて、
    現場の効率化と環境負荷低減に貢献しています。
  </p>

  <div class="cta">
    <a href="#">お問い合わせ</a>
  </div>
</section>

<footer>
  © 2026 株式会社ドリメイク
</footer>

</body>
</html>
