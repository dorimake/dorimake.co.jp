<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株式会社ドリメイク</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Noto Sans JP", sans-serif;
  color: #333;
}

/* ヘッダー */
.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 80px;
  background: rgba(40, 40, 40, 0.9);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
  z-index: 1000;
}

/* ロゴ */
.logo-link img {
  height: 60px;
  width: auto;
}

/* ナビ */
.nav {
  display: flex;
  gap: 40px;
}

.nav a {
  color: #fff;
  text-decoration: none;
  font-size: 16px;
  transition: 0.3s;
}

.nav a:hover {
  opacity: 0.6;
}

/* ヒーロー */
.hero {
  height: 100vh;
  background: url("hero-bg.png") no-repeat center/cover;
  position: relative;
  display: flex;
  align-items: center;
  padding-left: 80px;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

/* テキスト */
.hero-content {
  position: relative;
  color: #fff;
  max-width: 600px;
}

.hero-sub {
  font-size: 16px;
  margin-bottom: 20px;
}

.hero-title {
  font-size: 48px;
  font-weight: bold;
  margin-bottom: 10px;
}

.hero-en {
  font-size: 24px;
  letter-spacing: 4px;
  margin-bottom: 20px;
}

.hero-text {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 30px;
}

/* ボタン */
.btn-area {
  display: flex;
  gap: 20px;
}

.btn {
  padding: 14px 28px;
  border-radius: 30px;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

.btn-primary {
  background: #fff;
  color: #2ecc71;
}

.btn-primary:hover {
  opacity: 0.7;
}

.btn-outline {
  border: 1px solid #fff;
  color: #fff;
}

.btn-outline:hover {
  background: #fff;
  color: #333;
}
</style>

</head>

<body>

<header class="header">
  <a href="#" class="logo-link">
    <!-- ここが重要 -->
    <img src="logo2.png" alt="株式会社ドリメイク ロゴ">
  </a>

  <nav class="nav">
    <a href="#">Service</a>
    <a href="#">About</a>
    <a href="#">Company</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <div class="hero-sub">建設発生土の受け入れ・中間処理・骨材販売</div>
    <div class="hero-title">株式会社ドリメイク</div>
    <div class="hero-en">DORIMAKE</div>
    <div class="hero-text">
      現場の効率化と資源循環を支えるパートナー。<br>
      株式会社ドリメイクは、建設発生土の受け入れから中間処理、骨材販売まで一貫して対応します。
    </div>

    <div class="btn-area">
      <a href="#" class="btn btn-primary">お問い合わせ</a>
      <a href="#" class="btn btn-outline">事業内容を見る</a>
    </div>
  </div>
</section>

</body>
</html>
