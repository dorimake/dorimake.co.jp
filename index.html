<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>株式会社ドリメイク</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="株式会社ドリメイクは、建設発生土の受け入れ・中間処理・骨材販売を通じて、現場の効率化と資源循環を支えるパートナーです。">
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Arial","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      color:#333;
      background:#fff;
      line-height:1.7;
    }
    img { max-width:100%; display:block; }
    a { color:inherit; }

    .container {
      max-width:1200px;
      margin:0 auto;
      padding:0 24px;
    }

    header {
      position:fixed;
      top:0; left:0;
      width:100%;
      z-index:1000;
      background:rgba(63,63,63,0.92);
    }

    .header-inner {
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:88px;
    }

    .logo-link img { height:58px; }

    nav {
      display:flex;
      gap:28px;
    }

    nav a {
      color:#fff;
      text-decoration:none;
      font-weight:bold;
    }

    section { padding:100px 0; }

    .section-head h3 { font-size:40px; }

    .history-section {
      background:#ffffff;
    }

    .history-table {
      width:100%;
      border-collapse:collapse;
      background:#fff;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.06);
    }

    .history-table th,
    .history-table td {
      padding:20px;
      border-bottom:1px solid #eee;
      font-size:16px;
    }

    .history-table th {
      width:25%;
      background:#fafafa;
      font-weight:bold;
    }

    footer {
      background:#151515;
      color:#fff;
      text-align:center;
      padding:20px;
    }
  </style>
</head>

<body>

<header>
  <div class="container">
    <div class="header-inner">
      <a href="#top" class="logo-link">
        <img src="logo2.jpg">
      </a>
      <nav>
        <a href="#service">事業内容</a>
        <a href="#about">ドリメイクについて</a>
        <a href="#company">会社概要</a>
        <a href="#history">沿革</a>
        <a href="#contact">お問い合わせ</a>
      </nav>
    </div>
  </div>
</header>

<!-- 省略（他セクションは変更なし） -->

<section class="history-section" id="history">
  <div class="container">
    <div class="section-head">
      <h3>沿革</h3>
    </div>

    <table class="history-table">
      <tr>
        <th>2020年3月</th>
        <td>株式会社ドリメイク 設立</td>
      </tr>
      <tr>
        <th>2026年2月</th>
        <td>ストックヤード運営事業者に登録</td>
      </tr>
      <tr>
        <th>2024年11月</th>
        <td>Science Based Targetsイニシアティブ（SBTi）認定取得</td>
      </tr>
      <tr>
        <th>2026年4月</th>
        <td>Sports Afterschool OXB 協賛</td>
      </tr>
      <tr>
        <th>2026年4月</th>
        <td>株式会社FROGS 琉球frogs18期 協賛</td>
      </tr>
    </table>
  </div>
</section>

<footer>
  © 2026 株式会社ドリメイク All Rights Reserved.
</footer>

</body>
</html>
